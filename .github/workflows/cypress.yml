name: Cypress E2E Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

# Cancel in-progress hanya di branch non-main/master
# Hindari membatalkan deployment Pages yang sedang berjalan
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

# Default minimal – diperluas hanya di job yang butuh
permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Run Cypress Tests
  # ──────────────────────────────────────────────
  cypress-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            cypress-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          install: false
        env:
          CYPRESS_allure: true
          CYPRESS_allureResultsDir: allure-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-results
          path: cypress/results
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
          retention-days: 7
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Job 2: Generate Mochawesome Report
  # ──────────────────────────────────────────────
  generate-report:
    runs-on: ubuntu-latest
    needs: cypress-run
    if: always()
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download test results
        uses: actions/download-artifact@v4
        # FIX: continue jika artifact tidak ada (misal: test di-skip / artefak kosong)
        continue-on-error: true
        with:
          name: cypress-results
          path: cypress/results

      - name: Merge Mochawesome reports
        run: npm run merge:reports

      - name: Generate Mochawesome HTML report
        run: npm run generate:html

      - name: Upload Mochawesome report
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: cypress/reports
          retention-days: 7
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Job 3: Generate Allure Report & Deploy ke GitHub Pages
  #
  # FIX: Ganti actions/deploy-pages → peaceiris/actions-gh-pages
  #      Alasan:
  #        1. Mendukung Allure history (laporan kumulatif antar run)
  #        2. Metode resmi dari dokumentasi Allure
  #        3. Lebih stabil, tidak butuh GitHub Pages API token khusus
  #        4. Source Pages cukup "Deploy from a branch" (lebih sederhana)
  # ──────────────────────────────────────────────
  generate-allure-report:
    runs-on: ubuntu-latest
    needs: cypress-run
    # Tetap jalan walau test gagal, tapi HANYA di main/master
    if: >
      always() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 15
    # FIX: contents:write diperlukan agar peaceiris bisa push ke branch gh-pages
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      # FIX: Load history dari branch gh-pages agar grafik tren antar-run tersimpan
      # continue-on-error: true → aman untuk run pertama saat gh-pages belum ada
      - name: Load Allure history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # FIX: Gunakan simple-elf/allure-report-action untuk generate + preserve history
      - name: Build Allure report with history
        uses: simple-elf/allure-report-action@v1
        if: always()
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20  # Simpan 20 run terakhir

      # Opsional: simpan juga sebagai artifact untuk di-download manual
      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report
          retention-days: 14
          if-no-files-found: ignore

      # FIX: Push allure-history ke branch gh-pages → trigger "pages build and deployment"
      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
