name: Cypress E2E Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

# Batalkan run lama di branch yang sama agar tidak overlap
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default minimal — diperluas hanya di job yang butuh
permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Run Cypress tests
  # ──────────────────────────────────────────────
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # Node 18 sudah EOL sejak April 2025
          cache: 'npm'         # Otomatis cache npm registry cache antar run

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            cypress-${{ runner.os }}-   # Fallback jika key exact tidak ada

      - name: Install dependencies
        run: npm ci

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          install: false  # FIX: sudah diinstall manual di atas, hindari double install
        env:
          CYPRESS_allure: true                        # FIX: harus pakai prefix CYPRESS_
          CYPRESS_allureResultsDir: allure-results
        # FIX: hapus continue-on-error — CI harus merah saat test gagal
        #      job downstream pakai "if: always()" untuk tetap generate report

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-results
          path: cypress/results
          retention-days: 7   # FIX: batasi penyimpanan artifact
          if-no-files-found: ignore

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
          retention-days: 7
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Job 2: Generate Mochawesome report
  # ──────────────────────────────────────────────
  generate-report:
    runs-on: ubuntu-latest
    needs: cypress-run
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: cypress-results
          path: cypress/results

      - name: Merge Mochawesome reports
        run: npm run merge:reports

      - name: Generate Mochawesome HTML report
        run: npm run generate:html

      - name: Upload Mochawesome report
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: cypress/reports
          retention-days: 7
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Job 3: Generate Allure Report & Deploy ke GitHub Pages
  #         FIX: hanya jalan di branch main/master
  # ──────────────────────────────────────────────
  generate-allure-report:
    runs-on: ubuntu-latest
    needs: cypress-run
    # FIX: always() agar tetap jalan walau test gagal,
    #      tapi batasi deploy hanya di main/master
    if: >
      always() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      pages: write      # FIX: dipindah ke job level, bukan workflow level
      id-token: write   # FIX: idem
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure report
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
