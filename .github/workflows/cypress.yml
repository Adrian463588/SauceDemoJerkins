name: Cypress E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Menggunakan Node 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci
          # Memastikan dependensi BDD Gherkin terinstall
          npm install --save-dev @badeball/cypress-cucumber-preprocessor @bahmutov/cypress-esbuild-preprocessor esbuild

      - name: Run Cypress Tests (BDD and Cy.js)
        uses: cypress-io/github-action@v6
        with:
          # Jalan secara headless
          browser: chrome
          # Tambahkan script build jika ada (di proyek ini tidak ada)
          build: npm run pretest
          # Menjalankan script npm run test
          command: npm run test

      - name: Generate Reports
        if: always() # Report tetap di-generate meskipun test fail
        run: |
          npm run final:report
          npm run report:allure

      - name: Upload Mochawesome Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: cypress/reports/combined-report.html
          retention-days: 7

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 7

      - name: Upload Cypress Screenshots (On Failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7

      - name: Upload Cypress Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 7
