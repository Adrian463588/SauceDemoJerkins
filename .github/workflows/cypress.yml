name: Cypress E2E Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

# cancel-in-progress FALSE di main/master agar deployment Pages tidak ter-cancel
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Run Cypress Tests
  # ──────────────────────────────────────────────
  cypress-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            cypress-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          install: false
        env:
          CYPRESS_allure: true
          CYPRESS_allureResultsDir: allure-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-results
          path: cypress/results
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
          retention-days: 7
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Job 2: Generate Mochawesome Report
  # ──────────────────────────────────────────────
  generate-report:
    runs-on: ubuntu-latest
    needs: cypress-run
    if: always()
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download test results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: cypress-results
          path: cypress/results

      - name: Merge Mochawesome reports
        run: npm run merge:reports

      - name: Generate Mochawesome HTML report
        run: npm run generate:html

      - name: Upload Mochawesome report
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: cypress/reports
          retention-days: 7
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Job 3: Generate Allure Report & Deploy ke GitHub Pages
  #
  # FIX: Hapus simple-elf/allure-report-action (Docker broken)
  #      Ganti dengan: install allure-commandline via npm
  #      + manual history copy dari gh-pages branch
  # ──────────────────────────────────────────────
  generate-allure-report:
    runs-on: ubuntu-latest
    needs: cypress-run
    if: >
      always() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 15
    permissions:
      contents: write  # diperlukan oleh peaceiris/actions-gh-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Download allure-results dari Job 1
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      # Ambil history dari branch gh-pages untuk grafik tren antar-run
      # continue-on-error: true → aman untuk run pertama (gh-pages belum ada)
      - name: Get Allure history from gh-pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-branch

      # Salin history ke allure-results agar allure CLI bisa membaca tren sebelumnya
      # FIX: Ganti logika simple-elf dengan shell script murni — tidak butuh Docker
      - name: Copy previous history into allure-results
        run: |
          if [ -d "gh-pages-branch/history" ]; then
            echo "Found existing history, copying..."
            cp -r gh-pages-branch/history allure-results/history
          else
            echo "No previous history found, first run."
          fi

      # Install Allure CLI via npm (versi pinned untuk stabilitas)
      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline@2.32.0
          allure --version

      # Generate Allure report — output ke folder allure-report/
      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      # Simpan sebagai artifact (opsional, untuk download manual)
      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report
          retention-days: 14
          if-no-files-found: ignore

      # Push allure-report ke branch gh-pages
      # peaceiris menangani force-push agar tidak ada konflik history git
      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          # Tambahkan index.html redirect jika report berada di subfolder
          enable_jekyll: false
          force_orphan: false
